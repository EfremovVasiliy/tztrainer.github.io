<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>US Time Zones Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:       #0b0f1a;
    --surface:  #131929;
    --border:   #1e2d45;
    --accent:   #3b82f6;
    --accent2:  #f59e0b;
    --correct:  #10b981;
    --wrong:    #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --clock-bg: #0f1e35;
    --et:#6366f1; --ct:#8b5cf6; --mt:#ec4899;
    --pt:#3b82f6; --at:#10b981; --ht:#f59e0b;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  .score-bar { display:flex; gap:16px; align-items:center; }
  .stat { text-align:center; }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-val.green { color: var(--correct); }
  .stat-val.red   { color: var(--wrong); }
  .stat-val.amber { color: var(--accent2); }
  .stat-lbl {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* ── CLOCKS — horizontal scroll strip ── */
  .clocks-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .clocks-scroll::-webkit-scrollbar { display: none; }

  .clocks-strip {
    display: flex;
    gap: 0;
    width: max-content;
    padding: 0;
  }
  .tz-clock {
    background: var(--clock-bg);
    padding: 10px 16px;
    text-align: center;
    position: relative;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tz-clock::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .tz-clock[data-tz="ET"]::after { background: var(--et); }
  .tz-clock[data-tz="CT"]::after { background: var(--ct); }
  .tz-clock[data-tz="MT"]::after { background: var(--mt); }
  .tz-clock[data-tz="PT"]::after { background: var(--pt); }
  .tz-clock[data-tz="AT"]::after { background: var(--at); }
  .tz-clock[data-tz="HT"]::after { background: var(--ht); }

  .tz-name {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .tz-time {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .tz-offset {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── MAIN SCROLL AREA ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 32px;
    gap: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── MODE TABS ── */
  .mode-row {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    width: 100%;
    max-width: 560px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .mode-row::-webkit-scrollbar { display: none; }
  .mode-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .mode-btn.active {
    border-color: var(--accent);
    background: rgba(59,130,246,0.12);
    color: var(--text);
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 16px 20px;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .q-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .q-flag {
    font-size: 36px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .q-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .q-text {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 8px;
  }
  .q-time {
    font-family: 'Space Mono', monospace;
    font-size: clamp(32px, 10vw, 48px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.03em;
    margin-bottom: 4px;
    line-height: 1;
  }
  .q-date {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ── ANSWERS ── */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ans-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
    font-family: 'Space Mono', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    line-height: 1.3;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    word-break: break-word;
  }
  .ans-btn:active:not(:disabled) {
    background: rgba(59,130,246,0.10);
    border-color: var(--accent);
  }
  .ans-btn.correct {
    border-color: var(--correct);
    background: rgba(16,185,129,0.12);
    color: var(--correct);
  }
  .ans-btn.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.10);
    color: var(--wrong);
  }
  .ans-btn.reveal {
    border-color: var(--correct);
    background: rgba(16,185,129,0.07);
    color: var(--correct);
    opacity: 0.75;
  }
  .ans-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 16px;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.2s;
    min-height: 40px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 6px;
    text-align: left;
  }
  .feedback.show { opacity: 1; }
  .feedback.ok  { color: var(--correct); }
  .feedback.err { color: var(--wrong); }
  .fb-icon { font-size: 16px; flex-shrink:0; margin-top:1px; }

  /* ── NEXT BUTTON ── */
  .next-btn {
    margin-top: 18px;
    padding: 14px 0;
    width: 100%;
    max-width: 300px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .next-btn.show { display: block; margin-left: auto; margin-right: auto; }
  .next-btn:active { background: #2563eb; }

  /* ── SUMMARY ── */
  .summary-pct {
    font-family: 'Space Mono', monospace;
    font-size: clamp(40px, 15vw, 60px);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .summary-sub { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
  .summary-msg { font-size: 14px; color: var(--text); margin-bottom: 28px; }

  /* ── STREAK ANIMATION ── */
  @keyframes pop {
    0%  { transform: scale(1); }
    40% { transform: scale(1.45); }
    100%{ transform: scale(1); }
  }
  .pop { animation: pop 0.3s ease; }

  /* ── DESKTOP TWEAKS ── */
  @media (min-width: 600px) {
    header { padding: 16px 24px; }
    main   { padding: 24px 20px 48px; gap: 20px; }
    .card  { padding: 36px 40px 28px; }
    .q-text { font-size: 16px; }
    .ans-btn { padding: 16px 10px; min-height: 58px; }
    .clocks-strip { width: auto; }
    .tz-clock { flex: 1; }
    .mode-btn { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>US</span> Timezones</div>
  <div class="score-bar">
    <div class="stat">
      <div class="stat-val green" id="score-right">0</div>
      <div class="stat-lbl">верно</div>
    </div>
    <div class="stat">
      <div class="stat-val red" id="score-wrong">0</div>
      <div class="stat-lbl">ошибок</div>
    </div>
    <div class="stat">
      <div class="stat-val amber" id="score-streak">0</div>
      <div class="stat-lbl">серия</div>
    </div>
  </div>
</header>

<!-- LIVE CLOCKS -->
<div class="clocks-scroll">
  <div class="clocks-strip" id="clocks-strip"></div>
</div>

<!-- MAIN -->
<main>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="mode-row" id="mode-row">
    <button class="mode-btn active" data-mode="offset">Разница времени</button>
    <button class="mode-btn" data-mode="name">Часовой пояс</button>
    <button class="mode-btn" data-mode="convert">Конвертация</button>
  </div>

  <div class="card" id="card">
    <div class="q-label" id="q-label">вопрос</div>
    <div class="q-flag"  id="q-flag"></div>
    <div class="q-badge" id="q-badge"></div>
    <div class="q-text"  id="q-text"></div>
    <div class="q-time"  id="q-time"></div>
    <div class="q-date"  id="q-date"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback">
      <span class="fb-icon" id="fb-icon"></span>
      <span id="fb-text"></span>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Следующий →</button>
  </div>
</main>

<script>
// ── DATA ──────────────────────────────────────
const ZONES = [
  { id:'ET', name:'Eastern',  abbr:'EST/EDT', offset:-5, dstOffset:-4, color:'#6366f1', utcStr:'UTC−5/−4' },
  { id:'CT', name:'Central',  abbr:'CST/CDT', offset:-6, dstOffset:-5, color:'#8b5cf6', utcStr:'UTC−6/−5' },
  { id:'MT', name:'Mountain', abbr:'MST/MDT', offset:-7, dstOffset:-6, color:'#ec4899', utcStr:'UTC−7/−6' },
  { id:'PT', name:'Pacific',  abbr:'PST/PDT', offset:-8, dstOffset:-7, color:'#3b82f6', utcStr:'UTC−8/−7' },
  { id:'AT', name:'Alaska',   abbr:'AKST',    offset:-9, dstOffset:-8, color:'#10b981', utcStr:'UTC−9/−8' },
  { id:'HT', name:'Hawaii',   abbr:'HST',     offset:-10,dstOffset:-10,color:'#f59e0b', utcStr:'UTC−10'   },
];

const STATES = [
  { name:'Нью-Йорк',     flag:'🗽', tz:'ET' },
  { name:'Флорида',      flag:'🌴', tz:'ET' },
  { name:'Пенсильвания', flag:'🔔', tz:'ET' },
  { name:'Огайо',        flag:'🌽', tz:'ET' },
  { name:'Джорджия',     flag:'🍑', tz:'ET' },
  { name:'Мичиган',      flag:'🚗', tz:'ET' },
  { name:'Массачусетс',  flag:'🦞', tz:'ET' },
  { name:'Иллинойс',     flag:'🌆', tz:'CT' },
  { name:'Техас',        flag:'🤠', tz:'CT' },
  { name:'Висконсин',    flag:'🧀', tz:'CT' },
  { name:'Миннесота',    flag:'❄️', tz:'CT' },
  { name:'Луизиана',     flag:'🎷', tz:'CT' },
  { name:'Миссури',      flag:'🌉', tz:'CT' },
  { name:'Колорадо',     flag:'⛷️', tz:'MT' },
  { name:'Аризона',      flag:'🌵', tz:'MT' },
  { name:'Юта',          flag:'🏜️', tz:'MT' },
  { name:'Монтана',      flag:'🐻', tz:'MT' },
  { name:'Нью-Мексико',  flag:'🌶️', tz:'MT' },
  { name:'Калифорния',   flag:'🌁', tz:'PT' },
  { name:'Орегон',       flag:'🌲', tz:'PT' },
  { name:'Вашингтон',    flag:'☕', tz:'PT' },
  { name:'Невада',       flag:'🎰', tz:'PT' },
  { name:'Аляска',       flag:'🐻‍❄️', tz:'AT' },
  { name:'Гавайи',       flag:'🌺', tz:'HT' },
];

// ── STATE ─────────────────────────────────────
let mode = 'offset';
let right = 0, wrong = 0, streak = 0;
let answered = false, currentQ = null, questionCount = 0;
const SESSION = 20;

// ── HELPERS ───────────────────────────────────
function isDST() {
  const m = new Date().getMonth() + 1;
  return m >= 3 && m <= 11;
}
function getOff(tzId) {
  const z = ZONES.find(z => z.id === tzId);
  return isDST() ? z.dstOffset : z.offset;
}
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function fmtTime(h, m) {
  const ap = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ap}`;
}
function addH(h, d) { return ((h + d) % 24 + 24) % 24; }

// ── CLOCKS ────────────────────────────────────
function buildClocks() {
  document.getElementById('clocks-strip').innerHTML = ZONES.map(z => `
    <div class="tz-clock" data-tz="${z.id}">
      <div class="tz-name">${z.id}</div>
      <div class="tz-time" id="clk-${z.id}">--:--</div>
      <div class="tz-offset">${z.utcStr}</div>
    </div>`).join('');
}
function tickClocks() {
  const now = new Date();
  ZONES.forEach(z => {
    const off = isDST() ? z.dstOffset : z.offset;
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    const local = new Date(utcMs + off * 3600000);
    document.getElementById(`clk-${z.id}`).textContent =
      `${String(local.getHours()).padStart(2,'0')}:${String(local.getMinutes()).padStart(2,'0')}`;
  });
}

// ── QUESTION GENERATORS ───────────────────────
function genOffset() {
  const s1 = rand(STATES);
  let s2 = rand(STATES);
  while (s2.tz === s1.tz) s2 = rand(STATES);
  const diff = getOff(s2.tz) - getOff(s1.tz);
  const correct = diff > 0 ? `+${diff} ч` : `${diff} ч`;
  const wrongs = [-4,-3,-2,-1,1,2,3,4]
    .map(d => { const v = diff+d; return v > 0 ? `+${v} ч` : `${v} ч`; })
    .filter(x => x !== correct);
  return {
    flag: s1.flag, tz: s1.tz,
    text: `Когда в <b>${s1.name}</b> полдень, на сколько часов отличается время в <b>${s2.name}</b>?`,
    time: '', date: `${s1.name} (${s1.tz}) → ${s2.name} (${s2.tz})`,
    choices: shuffle([correct, ...shuffle(wrongs).slice(0,3)]),
    correct,
    expl: `${s1.name} UTC${getOff(s1.tz)} → ${s2.name} UTC${getOff(s2.tz)}: разница ${correct}`,
  };
}
function genName() {
  const s = rand(STATES);
  const z = ZONES.find(z => z.id === s.tz);
  const correct = `${z.id} · ${z.name}`;
  const wrongs = ZONES.filter(z => z.id !== s.tz).map(z => `${z.id} · ${z.name}`);
  return {
    flag: s.flag, tz: s.tz,
    text: `В каком часовом поясе находится штат`,
    time: s.name, date: '',
    choices: shuffle([correct, ...shuffle(wrongs).slice(0,3)]),
    correct,
    expl: `${s.name} → ${z.name} (${z.abbr}, ${z.utcStr})`,
  };
}
function genConvert() {
  const s1 = rand(STATES);
  let s2 = rand(STATES);
  while (s2.tz === s1.tz) s2 = rand(STATES);
  const diff = getOff(s2.tz) - getOff(s1.tz);
  const srcH = 6 + Math.floor(Math.random() * 14);
  const srcM = [0,15,30,45][Math.floor(Math.random()*4)];
  const correct = fmtTime(addH(srcH, diff), srcM);
  const wrongSet = new Set();
  [-3,-2,-1,1,2,3].forEach(d => {
    const s = fmtTime(addH(srcH, diff+d), srcM);
    if (s !== correct) wrongSet.add(s);
  });
  return {
    flag: s1.flag, tz: s1.tz,
    text: `Если в <b>${s1.name}</b> сейчас`,
    time: fmtTime(srcH, srcM),
    date: `то какое время в <b>${s2.name}</b>?`,
    choices: shuffle([correct, ...shuffle([...wrongSet]).slice(0,3)]),
    correct,
    expl: `${s1.name} UTC${getOff(s1.tz)}: ${fmtTime(srcH,srcM)} → ${s2.name} UTC${getOff(s2.tz)}: ${correct}`,
  };
}

// ── RENDER QUESTION ───────────────────────────
function nextQuestion() {
  if (questionCount >= SESSION) { showSummary(); return; }
  answered = false;
  questionCount++;

  currentQ = mode === 'offset' ? genOffset()
           : mode === 'name'   ? genName()
           :                     genConvert();

  const zone = ZONES.find(z => z.id === currentQ.tz);

  document.getElementById('q-label').textContent   = `Вопрос ${questionCount} / ${SESSION}`;
  document.getElementById('q-flag').textContent    = currentQ.flag;
  document.getElementById('q-text').innerHTML      = currentQ.text;
  document.getElementById('q-time').textContent    = currentQ.time;
  document.getElementById('q-date').innerHTML      = currentQ.date;

  const badge = document.getElementById('q-badge');
  badge.textContent = `${zone.id} · ${zone.name}`;
  badge.style.cssText = `background:${zone.color}22;color:${zone.color};border:1px solid ${zone.color}44`;

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('progress-fill').style.width = ((questionCount-1)/SESSION*100)+'%';

  const grid = document.getElementById('answers');
  grid.innerHTML = '';
  currentQ.choices.forEach(c => {
    const b = document.createElement('button');
    b.className = 'ans-btn';
    b.textContent = c;
    b.onclick = () => check(c, b);
    grid.appendChild(b);
  });
}

// ── CHECK ─────────────────────────────────────
function check(chosen, btn) {
  if (answered) return;
  answered = true;
  const ok = chosen === currentQ.correct;

  document.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === currentQ.correct)
      b.classList.add(ok ? 'correct' : 'reveal');
  });

  if (ok) {
    right++; streak++;
    btn.classList.remove('reveal');
    btn.classList.add('correct');
    const fb = document.getElementById('feedback');
    fb.className = 'feedback ok show';
    document.getElementById('fb-icon').textContent = '✓';
    document.getElementById('fb-text').textContent = rand(['Верно!','Отлично!','Правильно!','Молодец!']) + ' ' + currentQ.expl;
  } else {
    wrong++; streak = 0;
    btn.classList.add('wrong');
    const fb = document.getElementById('feedback');
    fb.className = 'feedback err show';
    document.getElementById('fb-icon').textContent = '✗';
    document.getElementById('fb-text').textContent = currentQ.expl;
  }

  document.getElementById('score-right').textContent  = right;
  document.getElementById('score-wrong').textContent  = wrong;
  const se = document.getElementById('score-streak');
  se.textContent = streak;
  se.classList.remove('pop');
  void se.offsetWidth;
  if (ok) se.classList.add('pop');

  document.getElementById('next-btn').className = 'next-btn show';
}

// ── SUMMARY ───────────────────────────────────
function showSummary() {
  const pct = Math.round(right / SESSION * 100);
  document.getElementById('card').innerHTML = `
    <div style="padding:16px 0">
      <div style="font-size:56px;margin-bottom:12px">${pct>=80?'🏆':pct>=60?'⭐':'📚'}</div>
      <div class="summary-pct">${pct}%</div>
      <div class="summary-sub">${right} правильных из ${SESSION}</div>
      <div class="summary-msg">${pct>=80?'Отличное знание часовых поясов!':pct>=60?'Хороший результат, есть куда расти.':'Продолжай тренироваться!'}</div>
      <button class="next-btn show" onclick="resetGame()">Начать заново</button>
    </div>`;
}

// ── RESET ─────────────────────────────────────
function resetGame() {
  right = wrong = streak = questionCount = 0;
  ['score-right','score-wrong','score-streak'].forEach(id =>
    document.getElementById(id).textContent = 0);
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('card').innerHTML = `
    <div class="q-label" id="q-label">вопрос</div>
    <div class="q-flag"  id="q-flag"></div>
    <div class="q-badge" id="q-badge"></div>
    <div class="q-text"  id="q-text"></div>
    <div class="q-time"  id="q-time"></div>
    <div class="q-date"  id="q-date"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback">
      <span class="fb-icon" id="fb-icon"></span>
      <span id="fb-text"></span>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Следующий →</button>`;
  nextQuestion();
}

// ── MODE TABS ─────────────────────────────────
document.getElementById('mode-row').addEventListener('click', e => {
  const b = e.target.closest('.mode-btn');
  if (!b) return;
  document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  mode = b.dataset.mode;
  resetGame();
});

// ── INIT ──────────────────────────────────────
buildClocks();
tickClocks();
setInterval(tickClocks, 15000);
nextQuestion();
</script>
</body>
</html>
